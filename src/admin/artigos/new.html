<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Artigo - Admin</title>
  <link rel="stylesheet" href="/src/admin/styles/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-dashboard">
  <!-- Mobile Hamburger -->
  <button class="admin-hamburger" id="hamburger-btn" aria-label="Abrir menu">
    <i data-lucide="menu" style="width:24px;height:24px"></i>
  </button>
  <div class="admin-sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-header">
      <div class="admin-sidebar-logo">
        <img src="/logo/logo-principal-branco.svg" alt="conheceFarma">
        <div>
          <h1>conheceFarma</h1>
          <p class="admin-sidebar-subtitle">Painel Administrativo</p>
        </div>
      </div>
    </div>

    <nav class="admin-nav-vertical">
      <a href="/src/admin/dashboard.html">
        <i data-lucide="home"></i>
        Dashboard
      </a>
      <a href="/src/admin/artigos/index.html" class="active">
        <i data-lucide="file-text"></i>
        Artigos
      </a>
      <a href="/src/admin/eventos/index.html">
        <i data-lucide="calendar"></i>
        Eventos
      </a>
      <a href="/src/admin/lives/index.html">
        <i data-lucide="video"></i>
        Lives
      </a>
    </nav>

    <div class="admin-sidebar-footer">
      <button id="dark-mode-toggle" class="admin-sidebar-btn" title="Alternar modo escuro">
        <i data-lucide="sun" class="sun-icon" width="20" height="20"></i>
        <i data-lucide="moon" class="moon-icon" width="20" height="20" style="display:none"></i>
      </button>
      <a href="#" id="logout-btn">
        <i data-lucide="log-out"></i>
        Sair
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main-content">
    <!-- Top Bar -->
    <div class="admin-top-bar">
      <div class="admin-search-container">
        <i data-lucide="search" class="admin-search-icon"></i>
        <input type="text" id="admin-search-input" class="admin-search-input" placeholder="Pesquisar artigos...">
      </div>

      <div class="admin-top-actions">
        <button class="admin-icon-btn">
          <i data-lucide="bell"></i>
          <span class="badge"></span>
        </button>

        <div class="admin-user-menu">
          <div class="admin-user-avatar">A</div>
          <div class="admin-user-info">
            <span class="admin-user-name">Administrador</span>
            <span class="admin-user-email">admin@conhecefarmacia.pt</span>
          </div>
        </div>
      </div>
    </div>


        <div class="admin-card">
            <form id="article-form" class="admin-form">
                <div class="admin-form-grid">
                    <div class="admin-form-group">
                        <label for="title">Título</label>
                        <input type="text" id="title" name="title" required class="admin-input" placeholder="Título do artigo">
                    </div>

                    <div class="admin-form-group">
                        <label for="slug">Slug</label>
                        <input type="text" id="slug" name="slug" required class="admin-input" placeholder="ex: nome-do-artigo">
                    </div>

                    <div class="admin-form-group">
                        <label for="category">Categoria</label>
                        <select id="category" name="category" required class="admin-input">
                            <option value="">Selecione...</option>
                            <option value="profissionais">Para Profissionais</option>
                            <option value="voce-sabia">Você Sabia?</option>
                            <option value="conheca-medicamento">Conheça o Medicamento</option>
                            <option value="curiosidades">Curiosidades</option>
                            <option value="saude">Saúde e Informação</option>
                        </select>
                    </div>

                    <div class="admin-form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status" required class="admin-input">
                            <option value="draft">Rascunho</option>
                            <option value="published">Publicado</option>
                        </select>
                    </div>
                </div>

                <div class="admin-form-group">
                    <label for="excerpt">Resumo/Excerto</label>
                    <textarea id="excerpt" name="excerpt" class="admin-textarea" style="min-height: 100px;" placeholder="Breve resumo do artigo"></textarea>
                </div>

                <div class="admin-form-group">
                    <label for="content">Conteúdo (Markdown)</label>
                    <textarea id="content" name="content" required class="admin-textarea" placeholder="Conteúdo completo do artigo em Markdown..."></textarea>
                </div>

                <div class="admin-form-grid">
                    <div class="admin-form-group">
                        <label for="author_name">Autor (Nome)</label>
                        <input type="text" id="author_name" name="author_name" class="admin-input" placeholder="Nome do autor">
                    </div>

                    <div class="admin-form-group">
                        <label for="author_role">Autor (Cargo)</label>
                        <input type="text" id="author_role" name="author_role" class="admin-input" placeholder="Cargo do autor">
                    </div>
                </div>

                <div class="admin-form-group">
                    <label for="author_bio">Autor (Biografia)</label>
                    <textarea id="author_bio" name="author_bio" class="admin-textarea" style="min-height: 60px;" placeholder="Breve biografia do autor"></textarea>
                </div>

                <div class="admin-form-group">
                    <label for="image_url">Imagem (URL)</label>
                    <input type="text" id="image_url" name="image_url" class="admin-input" placeholder="/images/artigo.jpg">
                    <div class="admin-image-upload" id="image-upload">
                        <p>📁 Clique para fazer upload ou arraste uma imagem</p>
                        <input type="file" id="image-file" accept="image/*" style="display: none;">
                    </div>
                    <img id="image-preview" class="admin-image-preview" style="display: none;">
                </div>

                <div class="admin-form-group">
                    <label>Referências</label>
                    <div id="references-container">
                        <div class="admin-reference-row">
                            <input type="text" class="admin-input reference-input" placeholder="URL ou texto da referência">
                            <button type="button" class="admin-btn admin-btn-sm admin-btn-danger" onclick="this.parentElement.remove()">Remover</button>
                        </div>
                    </div>
                    <button type="button" class="admin-btn admin-btn-sm" onclick="addReference()">+ Adicionar Referência</button>
                </div>

                <div class="admin-form-grid">
                    <div class="admin-form-group">
                        <label for="published_date">Data de Publicação</label>
                        <input type="date" id="published_date" name="published_date" class="admin-input">
                    </div>

                    <div class="admin-form-group">
                        <label for="read_time">Tempo de Leitura (min)</label>
                        <input type="number" id="read_time" name="read_time" class="admin-input" placeholder="5">
                    </div>
                </div>

                <div id="form-error" class="admin-error-message" style="display: none;"></div>

                <div class="admin-form-actions">
                    <button type="submit" class="admin-btn admin-btn-primary">Salvar Artigo</button>
                    <a href="/src/admin/artigos/index.html" class="admin-btn admin-btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    
  </main>


  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module">
    import { initDarkMode, toggleDarkMode } from '../lib/dark-mode.js';

    // Init dark mode
    initDarkMode();
    document.getElementById('dark-mode-toggle')?.addEventListener('click', toggleDarkMode);

    // Mobile hamburger menu
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const sidebar = document.querySelector('.admin-sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    function toggleSidebar() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('active');
    }

    hamburgerBtn?.addEventListener('click', toggleSidebar);
    sidebarOverlay?.addEventListener('click', toggleSidebar);

    // Close sidebar on link click (mobile)
    sidebar?.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          sidebar.classList.remove('open');
          sidebarOverlay.classList.remove('active');
        }
      });
    });

    // Initialize Lucide icons
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  </script>
</body>
</html>
