<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Artigo - Admin</title>
    <link rel="stylesheet" href="../styles/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-dashboard">
    <!-- Mobile Hamburger -->
    <button class="admin-hamburger" id="hamburger-btn" aria-label="Abrir menu">
        <i data-lucide="menu" style="width:24px;height:24px"></i>
    </button>
    <div class="admin-sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="admin-sidebar-header">
            <div class="admin-sidebar-logo">
                <img src="/logo/logo-principal-branco.svg" alt="conheceFarma">
                <div>
                    <h1>conheceFarma</h1>
                    <p class="admin-sidebar-subtitle">Painel Administrativo</p>
                </div>
            </div>
        </div>

        <nav class="admin-nav-vertical">
            <a href="../dashboard.html">
                <i data-lucide="home"></i>
                Dashboard
            </a>
            <a href="./index.html" class="active">
                <i data-lucide="file-text"></i>
                Artigos
            </a>
            <a href="../eventos/index.html">
                <i data-lucide="calendar"></i>
                Eventos
            </a>
            <a href="../lives/index.html">
                <i data-lucide="video"></i>
                Lives
            </a>
            <a href="../newsletter.html">
        <i data-lucide="mail"></i>
        Newsletter
      </a>
      <a href="../definicoes.html">
                <i data-lucide="settings"></i>
                Definições
            </a>
        </nav>

        <div class="admin-sidebar-footer">
            <button id="dark-mode-toggle" class="admin-sidebar-btn" title="Alternar modo escuro">
                <i data-lucide="sun" class="sun-icon" width="20" height="20"></i>
                <i data-lucide="moon" class="moon-icon" width="20" height="20" style="display:none"></i>
            </button>
            <a href="#" id="logout-btn">
                <i data-lucide="log-out"></i>
                Sair
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main-content">
        <!-- Top Bar -->
        <div class="admin-top-bar">
            <div class="admin-search-container">
                <i data-lucide="search" class="admin-search-icon"></i>
                <input type="text" id="admin-search-input" class="admin-search-input" placeholder="Pesquisar...">
            </div>

            <div class="admin-top-actions">
                <div class="admin-user-menu">
                    <div class="admin-user-avatar">A</div>
                    <div class="admin-user-info">
                        <span class="admin-user-name">Administrador</span>
                        <span class="admin-user-email">admin@conhecefarmacia.pt</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="admin-card">
            <form id="article-form" class="admin-form">
                <div class="admin-form-grid">
                    <div class="admin-form-group">
                        <label for="title">Título</label>
                        <input type="text" id="title" name="title" required class="admin-input" placeholder="Título do artigo">
                    </div>

                    <div class="admin-form-group">
                        <label for="slug">Slug</label>
                        <input type="text" id="slug" name="slug" required class="admin-input" placeholder="ex: nome-do-artigo">
                    </div>

                    <div class="admin-form-group">
                        <label for="category">Categoria</label>
                        <select id="category" name="category" required class="admin-input">
                            <option value="">Selecione...</option>
                            <option value="profissionais">Para Profissionais</option>
                            <option value="voce-sabia">Você Sabia?</option>
                            <option value="conheca-medicamento">Conheça o Medicamento</option>
                            <option value="curiosidades">Curiosidades</option>
                            <option value="saude">Saúde e Informação</option>
                        </select>
                    </div>

                    <div class="admin-form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status" required class="admin-input">
                            <option value="draft">Rascunho</option>
                            <option value="published">Publicado</option>
                        </select>
                    </div>
                </div>

                <div class="admin-form-group">
                    <label for="excerpt">Resumo/Excerto</label>
                    <textarea id="excerpt" name="excerpt" class="admin-textarea" style="min-height: 100px;" placeholder="Breve resumo do artigo"></textarea>
                </div>

                <div class="admin-form-group">
                    <label for="content">Conteúdo (Markdown)</label>
                    <div style="display: flex; gap: 8px;">
                        <button type="button" class="admin-textarea-expand" data-target="content" title="Expandir editor">
                            <i data-lucide="maximize-2"></i>
                            Expandir
                        </button>
                        <button type="button" id="preview-btn" class="admin-textarea-expand" title="Pré-visualizar artigo">
                            <i data-lucide="eye"></i>
                            Pré-visualizar
                        </button>
                    </div>
                    <textarea id="content" name="content" required class="admin-textarea" placeholder="Conteúdo completo do artigo em Markdown..."></textarea>
                </div>

                <div class="admin-form-grid">
                    <div class="admin-form-group">
                        <label for="author_name">Autor (Nome)</label>
                        <input type="text" id="author_name" name="author_name" class="admin-input" placeholder="Nome do autor">
                    </div>

                    <div class="admin-form-group">
                        <label for="author_role">Autor (Cargo)</label>
                        <input type="text" id="author_role" name="author_role" class="admin-input" placeholder="Cargo do autor">
                    </div>
                </div>

                <div class="admin-form-group">
                    <label for="author_bio">Autor (Biografia)</label>
                    <textarea id="author_bio" name="author_bio" class="admin-textarea" style="min-height: 60px;" placeholder="Breve biografia do autor"></textarea>
                </div>

                <div class="admin-form-group">
                    <label for="image_url">Imagem (URL)</label>
                    <input type="text" id="image_url" name="image_url" class="admin-input" placeholder="/images/artigo.jpg">
                    <div class="admin-image-upload" id="image-upload">
                        <p>Clique para fazer upload de uma imagem</p>
                        <input type="file" id="image-file" accept="image/*" style="display: none;">
                    </div>
                    <img id="image-preview" class="admin-image-preview" style="display: none;">
                </div>

                <div class="admin-form-group">
                    <label>Referências</label>
                    <div id="references-container">
                        <div class="admin-reference-row">
                            <input type="text" class="admin-input reference-input" placeholder="URL ou texto da referência">
                            <button type="button" class="admin-btn admin-btn-sm admin-btn-danger" onclick="this.parentElement.remove()">Remover</button>
                        </div>
                    </div>
                    <button type="button" class="admin-btn admin-btn-sm" onclick="addReference()">+ Adicionar Referência</button>
                </div>

                <div class="admin-form-grid">
                    <div class="admin-form-group">
                        <label for="published_date">Data de Publicação</label>
                        <input type="date" id="published_date" name="published_date" class="admin-input">
                    </div>

                    <div class="admin-form-group">
                        <label for="read_time">Tempo de Leitura (min)</label>
                        <input type="number" id="read_time" name="read_time" class="admin-input" placeholder="5">
                    </div>
                </div>

                <div id="form-error" class="admin-error-message" style="display: none;"></div>

                <div class="admin-form-actions">
                    <button type="submit" class="admin-btn admin-btn-primary">Salvar Artigo</button>
                    <a href="./index.html" class="admin-btn admin-btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Editor Overlay -->
    <div id="editor-overlay" class="admin-editor-overlay">
        <div class="admin-editor-overlay-content">
            <div class="admin-editor-overlay-header">
                <div class="admin-editor-overlay-title">
                    <i data-lucide="file-text"></i>
                    Conteúdo (Markdown)
                </div>
                <button type="button" id="editor-close" class="admin-editor-close">
                    <i data-lucide="x"></i>
                    Fechar
                </button>
            </div>
            <textarea id="editor-overlay-textarea" class="admin-editor-overlay-textarea" placeholder="Escreva o conteúdo em Markdown..."></textarea>
            <div class="admin-editor-overlay-footer">
                <span class="admin-editor-overlay-hint">
                    Pressione <kbd>Esc</kbd> para fechar
                </span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest" integrity="sha384-ZgnJ3Zpr70Xoify35DjOZWqHib1iYJBpYpQUIEpDASG9+fJ745WzNQuC004dwU0W" crossorigin="anonymous"></script>
    <script type="module">
        import { initDarkMode, toggleDarkMode } from '../lib/dark-mode.js';

        // Init dark mode
        initDarkMode();
        document.getElementById('dark-mode-toggle')?.addEventListener('click', toggleDarkMode);

        // Mobile hamburger menu
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebar = document.querySelector('.admin-sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('active');
        }

        hamburgerBtn?.addEventListener('click', toggleSidebar);
        sidebarOverlay?.addEventListener('click', toggleSidebar);

        // Close sidebar on link click (mobile)
        sidebar?.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('open');
                    sidebarOverlay.classList.remove('active');
                }
            });
        });

        // Initialize Lucide icons
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>

    <script type="module">
        import { supabaseClient } from '../../config.js';
        import { checkAuth } from '../lib/auth.js';
        import { compressImage, uploadImage } from '../lib/image-compressor.js';
        import { logAudit } from '../lib/audit-logger.js';
        import { openPreview } from '../lib/preview.js';

        // Check authentication
        await checkAuth();

        // Helper: Generate slug from title
        function generateSlug(title) {
            return title
                .toLowerCase()
                .replace(/à|á|â|ä|ã|å/g, 'a')
                .replace(/è|é|ê|ë/g, 'e')
                .replace(/ì|í|î|ï/g, 'i')
                .replace(/ò|ó|ô|ö|õ/g, 'o')
                .replace(/ù|ú|û|ü/g, 'u')
                .replace(/ç/g, 'c')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '');
        }

        // Update slug when title changes
        document.getElementById('title')?.addEventListener('input', function() {
            const slugInput = document.getElementById('slug');
            if (slugInput.value === '' || slugInput.value === generateSlug(this.value)) {
                slugInput.value = generateSlug(this.value);
            }
        });

        // Image upload handling
        const imageUpload = document.getElementById('image-upload');
        const imageFileInput = document.getElementById('image-file');
        const imagePreview = document.getElementById('image-preview');
        const imageUrlInput = document.getElementById('image_url');

        imageUpload?.addEventListener('click', () => imageFileInput?.click());

        imageFileInput?.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Compress image
            const compressedBlob = await compressImage(file);

            // Upload to Supabase Storage
            const fileName = `articles/${Date.now()}_${file.name}`;
            const result = await uploadImage(compressedBlob, 'article-images', fileName);

            if (result.url) {
                imageUrlInput.value = result.url;
                imagePreview.src = result.url;
                imagePreview.style.display = 'block';
            } else {
                alert('Erro no upload: ' + result.error);
            }
        });

        // Add reference field
        window.addReference = function() {
            const container = document.getElementById('references-container');
            const newRow = document.createElement('div');
            newRow.className = 'admin-reference-row';
            newRow.style.marginTop = '8px';
            newRow.innerHTML = `
                <input type="text" class="admin-input reference-input" placeholder="URL ou texto da referência" style="display: inline-block; width: calc(100% - 100px);">
                <button type="button" class="admin-btn admin-btn-sm admin-btn-danger" onclick="this.parentElement.remove()">Remover</button>
            `;
            container.appendChild(newRow);
        };

        // Form submission
        // Preview button
        document.getElementById('preview-btn')?.addEventListener('click', () => {
            openPreview({
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                category: document.getElementById('category').value,
                categoryLabel: document.getElementById('category').selectedOptions[0]?.textContent || '',
                imageUrl: document.getElementById('image_url').value,
                publishedDate: document.getElementById('published_date').value,
                authorName: document.getElementById('author_name').value,
                authorRole: document.getElementById('author_role').value,
                readTime: document.getElementById('read_time').value,
                excerpt: document.getElementById('excerpt').value,
            });
        });

        document.getElementById('article-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('form-error');
            errorDiv.style.display = 'none';

            // Collect references
            const references = Array.from(document.querySelectorAll('.reference-input'))
                .map(input => input.value.trim())
                .filter(ref => ref !== '');

            // Get category label
            const categorySelect = document.getElementById('category');
            const categoryLabel = categorySelect.options[categorySelect.selectedIndex]?.text || '';

            const articleData = {
                slug: document.getElementById('slug').value,
                title: document.getElementById('title').value,
                excerpt: document.getElementById('excerpt').value,
                category: document.getElementById('category').value,
                category_label: categoryLabel,
                content: document.getElementById('content').value,
                author_name: document.getElementById('author_name').value,
                author_role: document.getElementById('author_role').value,
                author_bio: document.getElementById('author_bio').value,
author_avatar: document.getElementById('author_avatar').value,
author_avatar_bg: document.getElementById('author_avatar_bg').value,
                image_url: document.getElementById('image_url').value,
                published_date: document.getElementById('published_date').value || null,
                read_time: parseInt(document.getElementById('read_time').value) || null,
                references_arr: references,
                status: document.getElementById('status').value,
            };

            try {
                const { data, error } = await supabaseClient
                    .from('articles')
                    .insert(articleData)
                    .select()
                    .single();

                if (error) throw error;

                // Log audit
                await logAudit('CREATE', 'articles', data.id, null, articleData);

                // Redirect to list
                window.location.href = './index.html';
            } catch (error) {
                errorDiv.textContent = 'Erro ao salvar: ' + error.message;
                errorDiv.style.display = 'block';
            }
        });

        // Logout handler
        document.getElementById('logout-btn')?.addEventListener('click', (e) => {
            e.preventDefault();
            import('../lib/auth.js').then(({ logout }) => logout());
        });

        // Markdown Editor Overlay
        const overlay = document.getElementById('editor-overlay');
        const overlayTextarea = document.getElementById('editor-overlay-textarea');
        let activeTextarea = null;

        function openEditor(targetId) {
            activeTextarea = document.getElementById(targetId);
            if (!activeTextarea) return;
            overlayTextarea.value = activeTextarea.value;
            overlay.classList.add('active');
            overlayTextarea.focus();
            document.body.style.overflow = 'hidden';
        }

        function closeEditor() {
            if (activeTextarea) {
                activeTextarea.value = overlayTextarea.value;
            }
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            activeTextarea = null;
        }

        document.querySelectorAll('.admin-textarea-expand').forEach(btn => {
            btn.addEventListener('click', () => openEditor(btn.dataset.target));
        });

        document.getElementById('editor-close')?.addEventListener('click', closeEditor);

        overlay?.addEventListener('click', (e) => {
            if (e.target === overlay) closeEditor();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && overlay.classList.contains('active')) {
                closeEditor();
            }
        });
    </script>
    <script type="module">
        import { checkAuth, getAdminProfile, updateTopBar, logout } from '../lib/auth.js';

        // Logout handler
        document.getElementById('logout-btn')?.addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        (async () => {
            await checkAuth();
            const profile = await getAdminProfile();
            if (profile) updateTopBar(profile);
        })();
    </script>
</body>
</html>
