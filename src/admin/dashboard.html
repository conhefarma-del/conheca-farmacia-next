<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Admin</title>
  <link rel="stylesheet" href="/src/admin/styles/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-dashboard">
  <!-- Mobile Hamburger -->
  <button class="admin-hamburger" id="hamburger-btn" aria-label="Abrir menu">
    <i data-lucide="menu" style="width:24px;height:24px"></i>
  </button>
  <div class="admin-sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-header">
      <div class="admin-sidebar-logo">
        <img src="/logo/logo-principal-branco.svg" alt="conheceFarma">
        <div>
          <h1>conheceFarma</h1>
          <p class="admin-sidebar-subtitle">Painel Administrativo</p>
        </div>
      </div>
    </div>

    <nav class="admin-nav-vertical">
      <a href="/src/admin/dashboard.html" class="active">
        <i data-lucide="home"></i>
        Dashboard
      </a>
      <a href="/src/admin/artigos/index.html">
        <i data-lucide="file-text"></i>
        Artigos
      </a>
      <a href="/src/admin/eventos/index.html">
        <i data-lucide="calendar"></i>
        Eventos
      </a>
      <a href="/src/admin/lives/index.html">
        <i data-lucide="video"></i>
        Lives
      </a>
    </nav>

    <div class="admin-sidebar-footer">
      <button id="dark-mode-toggle" class="admin-sidebar-btn" title="Alternar modo escuro">
        <i data-lucide="sun" class="sun-icon" width="20" height="20"></i>
        <i data-lucide="moon" class="moon-icon" width="20" height="20" style="display:none"></i>
      </button>
      <a href="#" id="logout-btn">
        <i data-lucide="log-out"></i>
        Sair
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main-content">
    <!-- Top Bar -->
    <div class="admin-top-bar">
      <div class="admin-search-container">
        <i data-lucide="search" class="admin-search-icon"></i>
        <input type="text" id="admin-search-input" class="admin-search-input" placeholder="Pesquisar artigos, eventos, lives...">
      </div>

      <div class="admin-top-actions">
        <button class="admin-icon-btn">
          <i data-lucide="bell"></i>
          <span class="badge"></span>
        </button>

        <div class="admin-user-menu">
          <div class="admin-user-avatar">A</div>
          <div class="admin-user-info">
            <span class="admin-user-name">Administrador</span>
            <span class="admin-user-email">admin@conhecefarmacia.pt</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Dashboard Content -->
    <div class="admin-content">
      <!-- Stats Grid -->
      <div class="admin-stats-grid">
        <!-- Pages -->
        <div class="admin-stat-card stat-green">
          <div class="admin-stat-card-icon">
            <i data-lucide="file-text"></i>
          </div>
          <div>
            <div class="admin-stat-card-label">Artigos</div>
            <div class="admin-stat-card-value" id="stat-articles">-</div>
          </div>
          <div class="admin-stat-card-actions">
            <button class="admin-stat-card-btn" onclick="window.location.href='/src/admin/artigos/index.html'">
              <i data-lucide="eye"></i>
              View All
            </button>
          </div>
        </div>

        <!-- Eventos -->
        <div class="admin-stat-card stat-purple">
          <div class="admin-stat-card-icon">
            <i data-lucide="calendar"></i>
          </div>
          <div>
            <div class="admin-stat-card-label">Eventos</div>
            <div class="admin-stat-card-value" id="stat-events">-</div>
          </div>
          <div class="admin-stat-card-actions">
            <button class="admin-stat-card-btn" onclick="window.location.href='/src/admin/eventos/index.html'">
              <i data-lucide="eye"></i>
              View All
            </button>
          </div>
        </div>

        <!-- Users -->
        <div class="admin-stat-card stat-orange">
          <div class="admin-stat-card-icon">
            <i data-lucide="users"></i>
          </div>
          <div>
            <div class="admin-stat-card-label">Utilizadores</div>
            <div class="admin-stat-card-value" id="stat-users">-</div>
          </div>
        </div>
      </div>

      <!-- Second Row -->
      <div class="admin-stats-grid">
        <!-- Lives -->
        <div class="admin-stat-card stat-blue">
          <div class="admin-stat-card-icon">
            <i data-lucide="video"></i>
          </div>
          <div>
            <div class="admin-stat-card-label">Lives</div>
            <div class="admin-stat-card-value" id="stat-files">-</div>
          </div>
          <div class="admin-stat-card-actions">
            <button class="admin-stat-card-btn" onclick="window.location.href='/src/admin/lives/index.html'">
              <i data-lucide="eye"></i>
              View All
            </button>
          </div>
        </div>

        <!-- Categories -->
        <div class="admin-stat-card stat-black">
          <div class="admin-stat-card-icon">
            <i data-lucide="grid-3x3"></i>
          </div>
          <div>
            <div class="admin-stat-card-label">Categorias</div>
            <div class="admin-stat-card-value" id="stat-categories">-</div>
          </div>
        </div>

        <!-- Total Conteúdos -->
        <div class="admin-stat-card stat-cyan">
          <div class="admin-stat-card-icon">
            <i data-lucide="archive"></i>
          </div>
          <div>
            <div class="admin-stat-card-label">Total Conteúdos</div>
            <div class="admin-stat-card-value" id="stat-total">-</div>
          </div>
        </div>
      </div>

      <!-- Dashboard Grid with Charts and Activity -->
      <div class="admin-dashboard-grid">
        <!-- User Stats Chart -->
        <div class="admin-dashboard-card">
          <h3>Atividade Recente</h3>
          <div class="admin-chart-container">
            <canvas id="userStatsChart"></canvas>
          </div>
        </div>

        <!-- Latest Events -->
        <div class="admin-dashboard-card">
          <h3>Últimos Eventos</h3>
          <ul class="admin-activity-list" id="latest-events">
            <!-- Events will be populated by JavaScript -->
          </ul>
        </div>

        <!-- Statistics -->
        <div class="admin-dashboard-card">
          <h3>Distribuição por Categoria</h3>
          <div class="admin-chart-container">
            <canvas id="statsChart"></canvas>
          </div>
        </div>

        <!-- Site Speed -->
        <div class="admin-dashboard-card">
          <h3>Site Speed</h3>
          <div class="admin-chart-container">
            <canvas id="speedChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="/src/admin/dashboard.js"></script>
  <script type="module">
    import { initDarkMode, toggleDarkMode } from './lib/dark-mode.js';

    // Init dark mode
    initDarkMode();
    document.getElementById('dark-mode-toggle')?.addEventListener('click', toggleDarkMode);

    // Mobile hamburger menu
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const sidebar = document.querySelector('.admin-sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    function toggleSidebar() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('active');
    }

    hamburgerBtn?.addEventListener('click', toggleSidebar);
    sidebarOverlay?.addEventListener('click', toggleSidebar);

    // Close sidebar on link click (mobile)
    sidebar?.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          sidebar.classList.remove('open');
          sidebarOverlay.classList.remove('active');
        }
      });
    });

    // Initialize Lucide icons
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  </script>
</body>
</html>
