<!DOCTYPE html>
<html lang="pt-PT">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Editar Evento - Admin</title>
 <link rel="stylesheet" href="../styles/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-dashboard">
  <!-- Mobile Hamburger -->
  <button class="admin-hamburger" id="hamburger-btn" aria-label="Abrir menu">
    <i data-lucide="menu" style="width:24px;height:24px"></i>
  </button>
  <div class="admin-sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-header">
      <div class="admin-sidebar-logo">
        <img src="/logo/logo-principal-branco.svg" alt="conheceFarma">
        <div>
          <h1>conheceFarma</h1>
          <p class="admin-sidebar-subtitle">Painel Administrativo</p>
        </div>
      </div>
    </div>

    <nav class="admin-nav-vertical">
      <a href="../dashboard.html">
        <i data-lucide="home"></i>
        Dashboard
      </a>
      <a href="../artigos/index.html">
        <i data-lucide="file-text"></i>
        Artigos
      </a>
      <a href="./index.html" class="active">
        <i data-lucide="calendar"></i>
        Eventos
      </a>
      <a href="../lives/index.html">
        <i data-lucide="video"></i>
        Lives
      </a>
      <a href="../newsletter.html">
        <i data-lucide="mail"></i>
        Newsletter
      </a>
      <a href="../definicoes.html">
        <i data-lucide="settings"></i>
        Definições
      </a>
    </nav>

    <div class="admin-sidebar-footer">
      <button id="dark-mode-toggle" class="admin-sidebar-btn" title="Alternar modo escuro">
        <i data-lucide="sun" class="sun-icon" width="20" height="20"></i>
        <i data-lucide="moon" class="moon-icon" width="20" height="20" style="display:none"></i>
      </button>
      <a href="#" id="logout-btn">
        <i data-lucide="log-out"></i>
        Sair
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main-content">
    <!-- Top Bar -->
    <div class="admin-top-bar">
      <div class="admin-search-container">
        <i data-lucide="search" class="admin-search-icon"></i>
        <input type="text" id="admin-search-input" class="admin-search-input" placeholder="Pesquisar...">
      </div>

      <div class="admin-top-actions">
        <div class="admin-user-menu">
          <div class="admin-user-avatar">A</div>
          <div class="admin-user-info">
            <span class="admin-user-name">Administrador</span>
            <span class="admin-user-email">admin@conhecefarmacia.pt</span>
          </div>
        </div>
      </div>
    </div>
    
 <div class="admin-card">
 <div id="loading" class="admin-loading">Carregando...</div>
 <form id="event-form" class="admin-form" style="display: none;">
 <div class="admin-form-grid">
 <div class="admin-form-group">
 <label for="title">Título</label>
 <input type="text" id="title" name="title" required class="admin-input" placeholder="Título do evento">
 </div>

 <div class="admin-form-group">
 <label for="slug">Slug</label>
 <input type="text" id="slug" name="slug" required class="admin-input" placeholder="ex: nome-do-evento">
 </div>

 <div class="admin-form-group">
 <label for="category">Categoria</label>
 <select id="category" name="category" required class="admin-input">
 <option value="">Selecione...</option>
 <option value="workshop">Workshop</option>
 <option value="palestra">Palestra</option>
 <option value="congresso">Congresso</option>
 <option value="seminario">Seminário</option>
 <option value="outro">Outro</option>
 </select>
 </div>

 <div class="admin-form-group">
 <label for="status">Status</label>
 <select id="status" name="status" required class="admin-input">
 <option value="draft">Rascunho</option>
 <option value="published">Publicado</option>
 </select>
 </div>
 </div>

 <div class="admin-form-group">
 <label class="admin-checkbox-label">
 <input type="checkbox" id="featured" name="featured">
 <span>Destacar na página principal</span>
 </label>
 </div>

 <div class="admin-form-group">
 <label for="excerpt">Resumo/Excerto</label>
 <textarea id="excerpt" name="excerpt" class="admin-textarea" style="min-height: 100px;" placeholder="Breve resumo do evento"></textarea>
 </div>

 <div class="admin-form-grid">
 <div class="admin-form-group">
 <label for="date">Data</label>
 <input type="date" id="date" name="date" required class="admin-input">
 </div>

 <div class="admin-form-group">
 <label for="time">Hora de Início</label>
 <input type="time" id="time" name="time" required class="admin-input">
 </div>

 <div class="admin-form-group">
 <label for="end_time">Hora de Fim</label>
 <input type="time" id="end_time" name="end_time" class="admin-input">
 </div>

 <div class="admin-form-group">
 <label for="location">Local</label>
 <input type="text" id="location" name="location" class="admin-input" placeholder="Local do evento">
 </div>
 </div>

 <div class="admin-form-grid">
 <div class="admin-form-group">
 <label for="type">Tipo</label>
 <select id="type" name="type" required class="admin-input">
 <option value="">Selecione...</option>
 <option value="presencial">Presencial</option>
 <option value="online">Online</option>
 <option value="hibrido">Híbrido</option>
 </select>
 </div>

 <div class="admin-form-group">
 <label for="capacity">Capacidade</label>
 <input type="number" id="capacity" name="capacity" class="admin-input" placeholder="100">
 </div>

 <div class="admin-form-group">
 <label for="registration_link">Link de Inscrição</label>
 <input type="url" id="registration_link" name="registration_link" class="admin-input" placeholder="https://...">
 </div>
 </div>

 <div class="admin-form-group">
 <label for="image_url">Imagem (URL)</label>
 <input type="text" id="image_url" name="image_url" class="admin-input" placeholder="/images/evento.jpg">
 <div class="admin-image-upload" id="image-upload">
 <p>Clique para fazer upload de uma imagem</p>
 <input type="file" id="image-file" accept="image/*" style="display: none;">
 </div>
 <img id="image-preview" class="admin-image-preview" style="display: none;">
 </div>

 <div class="admin-form-group">
 <label>Hosts/Palestrantes</label>
 <div id="hosts-container">
 <!-- Hosts will be populated dynamically -->
 </div>
 <button type="button" class="admin-btn admin-btn-sm" onclick="addHost()">+ Adicionar Host</button>
 </div>

 <div id="form-error" class="admin-error-message" style="display: none;"></div>

 <div class="admin-form-actions">
 <button type="submit" class="admin-btn admin-btn-primary">Atualizar Evento</button>
 <a href="./index.html" class="admin-btn admin-btn-secondary">Cancelar</a>
 </div>
 </form>
 </div>
 </main>

  <script src="https://unpkg.com/lucide@latest" integrity="sha384-ZgnJ3Zpr70Xoify35DjOZWqHib1iYJBpYpQUIEpDASG9+fJ745WzNQuC004dwU0W" crossorigin="anonymous"></script>
  <script type="module">
    import { initDarkMode, toggleDarkMode } from '../lib/dark-mode.js';

    // Init dark mode
    initDarkMode();
    document.getElementById('dark-mode-toggle')?.addEventListener('click', toggleDarkMode);

    // Mobile hamburger menu
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const sidebar = document.querySelector('.admin-sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    function toggleSidebar() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('active');
    }

    hamburgerBtn?.addEventListener('click', toggleSidebar);
    sidebarOverlay?.addEventListener('click', toggleSidebar);

    // Close sidebar on link click (mobile)
    sidebar?.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          sidebar.classList.remove('open');
          sidebarOverlay.classList.remove('active');
        }
      });
    });

    // Initialize Lucide icons
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  </script>

 <script type="module">
 import { supabaseClient } from '../../config.js';
 import { checkAuth } from '../lib/auth.js';
 import { compressImage, uploadImage } from '../lib/image-compressor.js';
 import { logAudit } from '../lib/audit-logger.js';
import { escapeAttr } from '../../lib/security.js';

 // Check authentication
 await checkAuth();

 let currentEventId = null;
 let oldValues = null;

 // Helper: Generate slug from title
 function generateSlug(title) {
 return title
 .toLowerCase()
 .replace(/à|á|â|ä|ã|å/g, 'a')
 .replace(/è|é|ê|ë/g, 'e')
 .replace(/ì|í|î|ï/g, 'i')
 .replace(/ò|ó|ô|ö|õ/g, 'o')
 .replace(/ù|ú|û|ü/g, 'u')
 .replace(/ç/g, 'c')
 .replace(/[^a-z0-9]+/g, '-')
 .replace(/^-|-$/g, '');
 }

 // Update slug when title changes
 document.getElementById('title')?.addEventListener('input', function() {
 const slugInput = document.getElementById('slug');
 if (slugInput.value === '' || slugInput.value === generateSlug(this.value)) {
 slugInput.value = generateSlug(this.value);
 }
 });

 // Add host field
 window.addHost = function(nameValue = '', roleValue = '', orgValue = '') {
 const container = document.getElementById('hosts-container');
 const newRow = document.createElement('div');
 newRow.className = 'admin-host-row';
 newRow.style.marginTop = '8px';
 newRow.innerHTML = `
 <input type="text" class="admin-input host-name" placeholder="Nome" value="${escapeAttr(nameValue)}" style="display: inline-block; width: 30%;">
 <input type="text" class="admin-input host-role" placeholder="Cargo" value="${escapeAttr(roleValue)}" style="display: inline-block; width: 30%;">
 <input type="text" class="admin-input host-org" placeholder="Organização" value="${escapeAttr(orgValue)}" style="display: inline-block; width: 30%;">
 <button type="button" class="admin-btn admin-btn-sm admin-btn-danger" onclick="this.parentElement.remove()">Remover</button>
 `;
 container.appendChild(newRow);
 };

 // Load event data
 async function loadEvent() {
 const params = new URLSearchParams(window.location.search);
 const id = params.get('id');

 if (!id) {
 alert('ID do evento não fornecido');
 window.location.href = './index.html';
 return;
 }

 currentEventId = id;

 const { data: event, error } = await supabaseClient
 .from('events')
 .select('*')
 .eq('id', id)
 .single();

 if (error || !event) {
 alert('Erro ao carregar evento: ' + (error?.message || 'Não encontrado'));
 window.location.href = './index.html';
 return;
 }

 // Store old values for audit
 oldValues = { ...event };

 // Populate form
 document.getElementById('title').value = event.title || '';
 document.getElementById('slug').value = event.slug || '';
 document.getElementById('category').value = event.category || '';
 document.getElementById('status').value = event.status || 'draft';
            document.getElementById('featured').checked = event.featured || false;
 document.getElementById('excerpt').value = event.excerpt || '';
 document.getElementById('date').value = event.date || '';
 document.getElementById('time').value = event.time || '';
 document.getElementById('end_time').value = event.end_time || '';
 document.getElementById('location').value = event.location || '';
 document.getElementById('type').value = event.type || '';
 document.getElementById('capacity').value = event.capacity || '';
 document.getElementById('registration_link').value = event.registration_link || '';
 document.getElementById('image_url').value = event.image_url || '';

 // Load hosts
 const container = document.getElementById('hosts-container');
 container.innerHTML = '';
 if (event.hosts && event.hosts.length > 0) {
 event.hosts.forEach(host => {
 addHost(host.name || '', host.role || '', host.organization || '');
 });
 } else {
 addHost(); // Add one empty row
 }

 // Show image preview
 if (event.image_url) {
 const imagePreview = document.getElementById('image-preview');
 imagePreview.src = event.image_url;
 imagePreview.style.display = 'block';
 }

 // Show form
 document.getElementById('loading').style.display = 'none';
 document.getElementById('event-form').style.display = 'block';
 }

 // Image upload handling
 const imageUpload = document.getElementById('image-upload');
 const imageFileInput = document.getElementById('image-file');
 const imagePreview = document.getElementById('image-preview');
 const imageUrlInput = document.getElementById('image_url');

 imageUpload?.addEventListener('click', () => imageFileInput?.click());

 imageFileInput?.addEventListener('change', async (e) => {
 const file = e.target.files[0];
 if (!file) return;

 // Compress image
 const compressedBlob = await compressImage(file);

 // Upload to Supabase Storage
 const fileName = `events/${Date.now()}_${file.name}`;
 const result = await uploadImage(compressedBlob, 'event-images', fileName);

 if (result.url) {
 imageUrlInput.value = result.url;
 imagePreview.src = result.url;
 imagePreview.style.display = 'block';
 } else {
 alert('Erro no upload: ' + result.error);
 }
 });

 // Form submission
 document.getElementById('event-form')?.addEventListener('submit', async (e) => {
 e.preventDefault();
 const errorDiv = document.getElementById('form-error');
 errorDiv.style.display = 'none';

 // Collect hosts
 const hosts = Array.from(document.querySelectorAll('.admin-host-row'))
 .map(row => ({
 name: row.querySelector('.host-name')?.value?.trim() || '',
 role: row.querySelector('.host-role')?.value?.trim() || '',
 organization: row.querySelector('.host-org')?.value?.trim() || ''
 }))
 .filter(host => host.name !== '');

 // Get category label
 const categorySelect = document.getElementById('category');
 const categoryLabel = categorySelect.options[categorySelect.selectedIndex]?.text || '';

 const eventData = {
 slug: document.getElementById('slug').value,
 title: document.getElementById('title').value,
 excerpt: document.getElementById('excerpt').value,
 category: document.getElementById('category').value,
 category_label: categoryLabel,
 date: document.getElementById('date').value,
 time: document.getElementById('time').value,
 end_time: document.getElementById('end_time').value || null,
 location: document.getElementById('location').value,
 type: document.getElementById('type').value,
 capacity: parseInt(document.getElementById('capacity').value) || null,
 hosts: hosts,
 image_url: document.getElementById('image_url').value,
 registration_link: document.getElementById('registration_link').value,
 status: document.getElementById('status').value,
 featured: document.getElementById('featured').checked,
 updated_at: new Date().toISOString(),
 };

 try {
 const { error } = await supabaseClient
 .from('events')
 .update(eventData)
 .eq('id', currentEventId);

 if (error) throw error;

 // Log audit
 await logAudit('UPDATE', 'events', currentEventId, oldValues, eventData);

 // Redirect to list
 window.location.href = './index.html';
 } catch (error) {
 errorDiv.textContent = 'Erro ao atualizar: ' + error.message;
 errorDiv.style.display = 'block';
 }
 });

 // Logout handler
 document.getElementById('logout-btn')?.addEventListener('click', (e) => {
 e.preventDefault();
 import('../lib/auth.js').then(({ logout }) => logout());
 });

 // Initialize
 loadEvent();
 </script>
  <script type="module">
    import { checkAuth, getAdminProfile, updateTopBar, logout } from '../lib/auth.js';

    // Logout handler
    document.getElementById('logout-btn')?.addEventListener('click', async (e) => {
      e.preventDefault();
      await logout();
    });

    (async () => {
      await checkAuth();
      const profile = await getAdminProfile();
      if (profile) updateTopBar(profile);
    })();
  </script>
</body>
</html>
