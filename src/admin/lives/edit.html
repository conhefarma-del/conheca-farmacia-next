<!DOCTYPE html>
<html lang="pt-PT">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Editar Live - Admin</title>
 <link rel="stylesheet" href="/src/admin/styles/admin.css">
</head>
<body class="admin-dashboard">
 <header class="admin-header">
 <div class="admin-logo">
 <h1>Editar Live</h1>
 </div>
 <nav class="admin-nav">
 <a href="/src/admin/dashboard.html">Dashboard</a>
 <a href="/src/admin/artigos/index.html">Artigos</a>
 <a href="/src/admin/eventos/index.html">Eventos</a>
 <a href="/src/admin/lives/index.html">Lives</a>
 <a href="#" id="logout-btn">Sair</a>
 </nav>
 </header>

 <main class="admin-content">
 <div class="admin-card">
 <div id="loading" class="admin-loading">Carregando...</div>
 <form id="live-form" class="admin-form" style="display: none;">
 <div class="admin-form-grid">
 <div class="admin-form-group">
 <label for="title">Título</label>
 <input type="text" id="title" name="title" required class="admin-input" placeholder="Título da live">
 </div>

 <div class="admin-form-group">
 <label for="slug">Slug</label>
 <input type="text" id="slug" name="slug" required class="admin-input" placeholder="ex: nome-da-live">
 </div>

 <div class="admin-form-group">
 <label for="category">Categoria</label>
 <select id="category" name="category" required class="admin-input">
 <option value="">Selecione...</option>
 <option value="live">Live</option>
 <option value="webinar">Webinar</option>
 <option value="entrevista">Entrevista</option>
 </select>
 </div>

 <div class="admin-form-group">
 <label for="status">Status</label>
 <select id="status" name="status" required class="admin-input">
 <option value="draft">Rascunho</option>
 <option value="published">Publicado</option>
 </select>
 </div>
 </div>

 <div class="admin-form-group">
 <label for="excerpt">Resumo/Excerto</label>
 <textarea id="excerpt" name="excerpt" class="admin-textarea" style="min-height: 100px;" placeholder="Breve resumo da live"></textarea>
 </div>

 <div class="admin-form-grid">
 <div class="admin-form-group">
 <label for="date">Data</label>
 <input type="date" id="date" name="date" required class="admin-input">
 </div>

 <div class="admin-form-group">
 <label for="time">Hora de Início</label>
 <input type="time" id="time" name="time" required class="admin-input">
 </div>

 <div class="admin-form-group">
 <label for="end_time">Hora de Fim</label>
 <input type="time" id="end_time" name="end_time" class="admin-input">
 </div>

 <div class="admin-form-group">
 <label for="platform">Plataforma</label>
 <input type="text" id="platform" name="platform" class="admin-input" placeholder="YouTube Live, Zoom, Google Meet...">
 </div>
 </div>

 <div class="admin-form-grid">
 <div class="admin-form-group">
 <label for="access_link">Link de Acesso</label>
 <input type="url" id="access_link" name="access_link" class="admin-input" placeholder="https://...">
 </div>

 <div class="admin-form-group">
 <label for="meeting_id">ID da Reunião</label>
 <input type="text" id="meeting_id" name="meeting_id" class="admin-input" placeholder="ID da reunião (se aplicável)">
 </div>

 <div class="admin-form-group">
 <label for="password">Senha</label>
 <input type="text" id="password" name="password" class="admin-input" placeholder="Senha de acesso (se aplicável)">
 </div>
 </div>

 <div class="admin-form-group">
 <label for="materials">Materiais de Apoio (JSON Array)</label>
 <textarea id="materials" name="materials" class="admin-textarea" style="min-height: 80px;" placeholder='["https://exemplo.com/material1.pdf", "https://exemplo.com/material2.pdf"]'></textarea>
 <small class="admin-hint">Formato JSON Array de URLs</small>
 </div>

 <div class="admin-form-grid">
 <div class="admin-form-group">
 <label for="host_name">Nome do Anfitrião</label>
 <input type="text" id="host_name" name="host_name" class="admin-input" placeholder="Nome completo">
 </div>

 <div class="admin-form-group">
 <label for="host_role">Cargo/Função</label>
 <input type="text" id="host_role" name="host_role" class="admin-input" placeholder="Farmacêutico · Palestrante">
 </div>

 <div class="admin-form-group">
 <label for="host_organization">Organização</label>
 <input type="text" id="host_organization" name="host_organization" class="admin-input" placeholder="Conheça Farmácia">
 </div>
 </div>

 <div class="admin-form-group">
 <label for="image_url">Imagem (URL)</label>
 <input type="text" id="image_url" name="image_url" class="admin-input" placeholder="/images/live.jpg">
 <div class="admin-image-upload" id="image-upload">
 <p>Clique para fazer upload ou arraste uma imagem</p>
 <input type="file" id="image-file" accept="image/*" style="display: none;">
 </div>
 <img id="image-preview" class="admin-image-preview" style="display: none;">
 </div>

 <div id="form-error" class="admin-error-message" style="display: none;"></div>

 <div class="admin-form-actions">
 <button type="submit" class="admin-btn admin-btn-primary">Atualizar Live</button>
 <a href="/src/admin/lives/index.html" class="admin-btn admin-btn-secondary">Cancelar</a>
 <button type="button" id="delete-btn" class="admin-btn admin-btn-danger">Excluir Live</button>
 </div>
 </form>
 </div>
 </main>

 <script type="module">
 import { supabaseClient } from '../../config.js';
 import { checkAuth } from '../lib/auth.js';
 import { compressImage, uploadImage } from '../lib/image-compressor.js';
 import { logAudit } from '../lib/audit-logger.js';

 // Check authentication
 await checkAuth();

 // Get live ID from URL
 const urlParams = new URLSearchParams(window.location.search);
 const liveId = urlParams.get('id');

 if (!liveId) {
 alert('ID da live não fornecido');
 window.location.href = '/src/admin/lives/index.html';
 }

 // Load live data
 async function loadLive() {
 const { data: live, error } = await supabaseClient
 .from('lives')
 .select('*')
 .eq('id', liveId)
 .single();

 if (error || !live) {
 alert('Live não encontrada');
 window.location.href = '/src/admin/lives/index.html';
 return;
 }

 // Populate form
 document.getElementById('title').value = live.title || '';
 document.getElementById('slug').value = live.slug || '';
 document.getElementById('category').value = live.category || '';
 document.getElementById('status').value = live.status || 'draft';
 document.getElementById('excerpt').value = live.excerpt || '';
 document.getElementById('date').value = live.date || '';
 document.getElementById('time').value = live.time || '';
 document.getElementById('end_time').value = live.end_time || '';
 document.getElementById('platform').value = live.platform || '';
 document.getElementById('access_link').value = live.access_link || '';
 document.getElementById('meeting_id').value = live.meeting_id || '';
 document.getElementById('password').value = live.password || '';
 document.getElementById('materials').value = live.materials ? JSON.stringify(live.materials, null, 2) : '';
 document.getElementById('host_name').value = live.host_name || '';
 document.getElementById('host_role').value = live.host_role || '';
 document.getElementById('host_organization').value = live.host_organization || '';
 document.getElementById('image_url').value = live.image_url || '';

 // Show image preview
 const imagePreview = document.getElementById('image-preview');
 if (live.image_url) {
 imagePreview.src = live.image_url;
 imagePreview.style.display = 'block';
 }

 // Hide loading, show form
 document.getElementById('loading').style.display = 'none';
 document.getElementById('live-form').style.display = 'block';
 }

 loadLive();

 // Helper: Generate slug from title
 document.getElementById('title')?.addEventListener('input', function() {
 const slugInput = document.getElementById('slug');
 // Only auto-update if slug hasn't been manually edited
 if (slugInput.dataset.edited !== 'true') {
 slugInput.value = generateSlug(this.value);
 }
 });

 document.getElementById('slug')?.addEventListener('input', function() {
 this.dataset.edited = 'true';
 });

 function generateSlug(title) {
 return title
 .toLowerCase()
 .replace(/à|á|â|ä|ã|å/g, 'a')
 .replace(/è|é|ê|ë/g, 'e')
 .replace(/ì|í|î|ï/g, 'i')
 .replace(/ò|ó|ô|ö|õ/g, 'o')
 .replace(/ù|ú|û|ü/g, 'u')
 .replace(/ç/g, 'c')
 .replace(/[^a-z0-9]+/g, '-')
 .replace(/^-|-$/g, '');
 }

 // Image upload handling
 const imageUpload = document.getElementById('image-upload');
 const imageFileInput = document.getElementById('image-file');
 const imagePreview = document.getElementById('image-preview');
 const imageUrlInput = document.getElementById('image_url');

 imageUpload?.addEventListener('click', () => imageFileInput?.click());

 imageFileInput?.addEventListener('change', async (e) => {
 const file = e.target.files[0];
 if (!file) return;

 // Compress image
 const compressedBlob = await compressImage(file);

 // Upload to Supabase Storage
 const fileName = `lives/${Date.now()}_${file.name}`;
 const result = await uploadImage(compressedBlob, 'event-images', fileName);

 if (result.url) {
 imageUrlInput.value = result.url;
 imagePreview.src = result.url;
 imagePreview.style.display = 'block';
 } else {
 alert('Erro no upload: ' + result.error);
 }
 });

 // Form submission - Update
 document.getElementById('live-form')?.addEventListener('submit', async (e) => {
 e.preventDefault();
 const errorDiv = document.getElementById('form-error');
 errorDiv.style.display = 'none';

 // Get current values for audit
 const { data: currentData } = await supabaseClient
 .from('lives')
 .select('*')
 .eq('id', liveId)
 .single();

 // Get category label
 const categorySelect = document.getElementById('category');
 const categoryLabel = categorySelect.options[categorySelect.selectedIndex]?.text || '';

 // Parse materials JSON
 let materials = [];
 const materialsValue = document.getElementById('materials').value.trim();
 if (materialsValue) {
 try {
 materials = JSON.parse(materialsValue);
 if (!Array.isArray(materials)) {
 throw new Error('Materiais deve ser um array JSON');
 }
 } catch (error) {
 errorDiv.textContent = 'Erro nos materiais: Formato JSON inválido. Use ["url1", "url2"]';
 errorDiv.style.display = 'block';
 return;
 }
 }

 const liveData = {
 slug: document.getElementById('slug').value,
 title: document.getElementById('title').value,
 excerpt: document.getElementById('excerpt').value,
 category: document.getElementById('category').value,
 category_label: categoryLabel,
 date: document.getElementById('date').value,
 time: document.getElementById('time').value,
 end_time: document.getElementById('end_time').value || null,
 platform: document.getElementById('platform').value,
 access_link: document.getElementById('access_link').value,
 meeting_id: document.getElementById('meeting_id').value,
 password: document.getElementById('password').value,
 materials: materials,
 host_name: document.getElementById('host_name').value,
 host_role: document.getElementById('host_role').value,
 host_organization: document.getElementById('host_organization').value,
 image_url: document.getElementById('image_url').value,
 status: document.getElementById('status').value,
 };

 try {
 const { error } = await supabaseClient
 .from('lives')
 .update(liveData)
 .eq('id', liveId);

 if (error) throw error;

 // Log audit
 await logAudit('UPDATE', 'lives', liveId, currentData, liveData);

 // Redirect to list
 window.location.href = '/src/admin/lives/index.html';
 } catch (error) {
 errorDiv.textContent = 'Erro ao atualizar: ' + error.message;
 errorDiv.style.display = 'block';
 }
 });

 // Delete button
 document.getElementById('delete-btn')?.addEventListener('click', async () => {
 if (!confirm('Tem a certeza que deseja excluir esta live? Esta ação não pode ser desfeita.')) {
 return;
 }

 try {
 // Get current data for audit
 const { data: currentData } = await supabaseClient
 .from('lives')
 .select('*')
 .eq('id', liveId)
 .single();

 const { error } = await supabaseClient
 .from('lives')
 .delete()
 .eq('id', liveId);

 if (error) throw error;

 // Log audit
 await logAudit('DELETE', 'lives', liveId, currentData, null);

 window.location.href = '/src/admin/lives/index.html';
 } catch (error) {
 alert('Erro ao excluir: ' + error.message);
 }
 });

 // Logout handler
 document.getElementById('logout-btn')?.addEventListener('click', (e) => {
 e.preventDefault();
 import('../lib/auth.js').then(({ logout }) => logout());
 });
 </script>
</body>
</html>
