<!DOCTYPE html>
<html lang="pt-PT">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Nova Live - Admin</title>
 <link rel="stylesheet" href="../styles/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-dashboard">
  <!-- Mobile Hamburger -->
  <button class="admin-hamburger" id="hamburger-btn" aria-label="Abrir menu">
    <i data-lucide="menu" style="width:24px;height:24px"></i>
  </button>
  <div class="admin-sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-header">
      <div class="admin-sidebar-logo">
        <img src="/logo/logo-principal-branco.svg" alt="conheceFarma">
        <div>
          <h1>conheceFarma</h1>
          <p class="admin-sidebar-subtitle">Painel Administrativo</p>
        </div>
      </div>
    </div>

    <nav class="admin-nav-vertical">
      <a href="../dashboard.html">
        <i data-lucide="home"></i>
        Dashboard
      </a>
      <a href="../artigos/index.html">
        <i data-lucide="file-text"></i>
        Artigos
      </a>
      <a href="../eventos/index.html">
        <i data-lucide="calendar"></i>
        Eventos
      </a>
      <a href="./index.html" class="active">
        <i data-lucide="video"></i>
        Lives
      </a>
      <a href="../newsletter.html">
        <i data-lucide="mail"></i>
        Newsletter
      </a>
      <a href="../definicoes.html">
        <i data-lucide="settings"></i>
        Definições
      </a>
    </nav>

    <div class="admin-sidebar-footer">
      <button id="dark-mode-toggle" class="admin-sidebar-btn" title="Alternar modo escuro">
        <i data-lucide="sun" class="sun-icon" width="20" height="20"></i>
        <i data-lucide="moon" class="moon-icon" width="20" height="20" style="display:none"></i>
      </button>
      <a href="#" id="logout-btn">
        <i data-lucide="log-out"></i>
        Sair
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main-content">
    <!-- Top Bar -->
    <div class="admin-top-bar">
      <div class="admin-search-container">
        <i data-lucide="search" class="admin-search-icon"></i>
        <input type="text" id="admin-search-input" class="admin-search-input" placeholder="Pesquisar...">
      </div>

      <div class="admin-top-actions">
        <div class="admin-user-menu">
          <div class="admin-user-avatar">A</div>
          <div class="admin-user-info">
            <span class="admin-user-name">Administrador</span>
            <span class="admin-user-email">admin@conhecefarmacia.pt</span>
          </div>
        </div>
      </div>
    </div>
 <div class="admin-card">
 <form id="live-form" class="admin-form">
 <div class="admin-form-grid">
 <div class="admin-form-group">
 <label for="title">Título</label>
 <input type="text" id="title" name="title" required class="admin-input" placeholder="Título da live">
 </div>

 <div class="admin-form-group">
 <label for="slug">Slug</label>
 <input type="text" id="slug" name="slug" required class="admin-input" placeholder="ex: nome-da-live">
 </div>

 <div class="admin-form-group">
 <label for="category">Categoria</label>
 <select id="category" name="category" required class="admin-input">
 <option value="">Selecione...</option>
 <option value="live">Live</option>
 <option value="webinar">Webinar</option>
 <option value="entrevista">Entrevista</option>
 </select>
 </div>

 <div class="admin-form-group">
 <label for="status">Status</label>
 <select id="status" name="status" required class="admin-input">
 <option value="draft">Rascunho</option>
 <option value="published">Publicado</option>
 </select>
 </div>
 </div>

 <div class="admin-form-group">
 <label for="excerpt">Resumo/Excerto</label>
 <textarea id="excerpt" name="excerpt" class="admin-textarea" style="min-height: 100px;" placeholder="Breve resumo da live"></textarea>
 </div>

 <div class="admin-form-grid">
 <div class="admin-form-group">
 <label for="date">Data</label>
 <input type="date" id="date" name="date" required class="admin-input">
 </div>

 <div class="admin-form-group">
 <label for="time">Hora de Início</label>
 <input type="time" id="time" name="time" required class="admin-input">
 </div>

 <div class="admin-form-group">
 <label for="end_time">Hora de Fim</label>
 <input type="time" id="end_time" name="end_time" class="admin-input">
 </div>

 <div class="admin-form-group">
 <label for="platform">Plataforma</label>
 <input type="text" id="platform" name="platform" class="admin-input" placeholder="YouTube Live, Zoom, Google Meet...">
 </div>
 </div>

 <div class="admin-form-grid">
 <div class="admin-form-group">
 <label for="access_link">Link de Acesso</label>
 <input type="url" id="access_link" name="access_link" class="admin-input" placeholder="https://...">
 </div>

 <div class="admin-form-group">
 <label for="meeting_id">ID da Reunião</label>
 <input type="text" id="meeting_id" name="meeting_id" class="admin-input" placeholder="ID da reunião (se aplicável)">
 </div>

 <div class="admin-form-group">
 <label for="password">Senha</label>
 <input type="password" id="password" name="password" class="admin-input" placeholder="Senha de acesso (se aplicável)">
 </div>
 </div>

 <div class="admin-form-group">
 <label for="materials">Materiais de Apoio (JSON Array)</label>
 <textarea id="materials" name="materials" class="admin-textarea" style="min-height: 80px;" placeholder='["https://exemplo.com/material1.pdf", "https://exemplo.com/material2.pdf"]'></textarea>
 <small class="admin-hint">Formato JSON Array de URLs</small>
 </div>

 <div class="admin-form-grid">
 <div class="admin-form-group">
 <label for="host_name">Nome do Anfitrião</label>
 <input type="text" id="host_name" name="host_name" class="admin-input" placeholder="Nome completo">
 </div>

 <div class="admin-form-group">
 <label for="host_role">Cargo/Função</label>
 <input type="text" id="host_role" name="host_role" class="admin-input" placeholder="Farmacêutico · Palestrante">
 </div>

 <div class="admin-form-group">
 <label for="host_organization">Organização</label>
 <input type="text" id="host_organization" name="host_organization" class="admin-input" placeholder="Conheça Farmácia">
 </div>
 </div>

 <div class="admin-form-group">
 <label for="image_url">Imagem (URL)</label>
 <input type="text" id="image_url" name="image_url" class="admin-input" placeholder="/images/live.jpg">
 <div class="admin-image-upload" id="image-upload">
 <p>Clique para fazer upload de uma imagem</p>
 <input type="file" id="image-file" accept="image/*" style="display: none;">
 </div>
 <img id="image-preview" class="admin-image-preview" style="display: none;">
 </div>

 <div id="form-error" class="admin-error-message" style="display: none;"></div>

 <div class="admin-form-actions">
 <button type="submit" class="admin-btn admin-btn-primary">Salvar Live</button>
 <a href="./index.html" class="admin-btn admin-btn-secondary">Cancelar</a>
 </div>
 </form>
 </div>
 </main>

  <script src="https://unpkg.com/lucide@latest" integrity="sha384-ZgnJ3Zpr70Xoify35DjOZWqHib1iYJBpYpQUIEpDASG9+fJ745WzNQuC004dwU0W" crossorigin="anonymous"></script>
  <script type="module">
    import { initDarkMode, toggleDarkMode } from '../lib/dark-mode.js';

    // Init dark mode
    initDarkMode();
    document.getElementById('dark-mode-toggle')?.addEventListener('click', toggleDarkMode);

    // Mobile hamburger menu
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const sidebar = document.querySelector('.admin-sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    function toggleSidebar() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('active');
    }

    hamburgerBtn?.addEventListener('click', toggleSidebar);
    sidebarOverlay?.addEventListener('click', toggleSidebar);

    // Close sidebar on link click (mobile)
    sidebar?.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          sidebar.classList.remove('open');
          sidebarOverlay.classList.remove('active');
        }
      });
    });

    // Initialize Lucide icons
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  </script>

 <script type="module">
 import { supabaseClient } from '../../config.js';
 import { checkAuth } from '../lib/auth.js';
 import { compressImage, uploadImage } from '../lib/image-compressor.js';
 import { logAudit } from '../lib/audit-logger.js';

 // Check authentication
 await checkAuth();

 // Helper: Generate slug from title
 function generateSlug(title) {
 return title
 .toLowerCase()
 .replace(/à|á|â|ä|ã|å/g, 'a')
 .replace(/è|é|ê|ë/g, 'e')
 .replace(/ì|í|î|ï/g, 'i')
 .replace(/ò|ó|ô|ö|õ/g, 'o')
 .replace(/ù|ú|û|ü/g, 'u')
 .replace(/ç/g, 'c')
 .replace(/[^a-z0-9]+/g, '-')
 .replace(/^-|-$/g, '');
 }

 // Update slug when title changes
 document.getElementById('title')?.addEventListener('input', function() {
 const slugInput = document.getElementById('slug');
 if (slugInput.value === '' || slugInput.value === generateSlug(this.value)) {
 slugInput.value = generateSlug(this.value);
 }
 });

 // Image upload handling
 const imageUpload = document.getElementById('image-upload');
 const imageFileInput = document.getElementById('image-file');
 const imagePreview = document.getElementById('image-preview');
 const imageUrlInput = document.getElementById('image_url');

 imageUpload?.addEventListener('click', () => imageFileInput?.click());

 imageFileInput?.addEventListener('change', async (e) => {
 const file = e.target.files[0];
 if (!file) return;

 // Compress image
 const compressedBlob = await compressImage(file);

 // Upload to Supabase Storage
 const fileName = `lives/${Date.now()}_${file.name}`;
 const result = await uploadImage(compressedBlob, 'live-images', fileName);

 if (result.url) {
 imageUrlInput.value = result.url;
 imagePreview.src = result.url;
 imagePreview.style.display = 'block';
 } else {
 alert('Erro no upload: ' + result.error);
 }
 });

 // Form submission
 document.getElementById('live-form')?.addEventListener('submit', async (e) => {
 e.preventDefault();
 const errorDiv = document.getElementById('form-error');
 errorDiv.style.display = 'none';

 // Get category label
 const categorySelect = document.getElementById('category');
 const categoryLabel = categorySelect.options[categorySelect.selectedIndex]?.text || '';

 // Parse materials JSON
 let materials = [];
 const materialsValue = document.getElementById('materials').value.trim();
 if (materialsValue) {
 try {
 materials = JSON.parse(materialsValue);
 if (!Array.isArray(materials)) {
 throw new Error('Materiais deve ser um array JSON');
 }
 } catch (error) {
 errorDiv.textContent = 'Erro nos materiais: Formato JSON inválido. Use ["url1", "url2"]';
 errorDiv.style.display = 'block';
 return;
 }
 }

 const liveData = {
 slug: document.getElementById('slug').value,
 title: document.getElementById('title').value,
 excerpt: document.getElementById('excerpt').value,
 category: document.getElementById('category').value,
 category_label: categoryLabel,
 date: document.getElementById('date').value,
 time: document.getElementById('time').value,
 end_time: document.getElementById('end_time').value || null,
 platform: document.getElementById('platform').value,
 access_link: document.getElementById('access_link').value,
 meeting_id: document.getElementById('meeting_id').value,
 password: document.getElementById('password').value,
 materials: materials,
 host_name: document.getElementById('host_name').value,
 host_role: document.getElementById('host_role').value,
 host_organization: document.getElementById('host_organization').value,
 image_url: document.getElementById('image_url').value,
 status: document.getElementById('status').value,
 };

 try {
 const { data, error } = await supabaseClient
 .from('lives')
 .insert(liveData)
 .select()
 .single();

 if (error) throw error;

 // Log audit
 await logAudit('CREATE', 'lives', data.id, null, liveData);

 // Redirect to list
 window.location.href = './index.html';
 } catch (error) {
 errorDiv.textContent = 'Erro ao salvar: ' + error.message;
 errorDiv.style.display = 'block';
 }
 });

 // Logout handler
 document.getElementById('logout-btn')?.addEventListener('click', (e) => {
 e.preventDefault();
 import('../lib/auth.js').then(({ logout }) => logout());
 });
 </script>
  <script type="module">
    import { checkAuth, getAdminProfile, updateTopBar, logout } from '../lib/auth.js';

    // Logout handler
    document.getElementById('logout-btn')?.addEventListener('click', async (e) => {
      e.preventDefault();
      await logout();
    });

    (async () => {
      await checkAuth();
      const profile = await getAdminProfile();
      if (profile) updateTopBar(profile);
    })();
  </script>
</body>
</html>
