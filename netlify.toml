[build]
  command = "npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "20" }

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  publish = "dist"
  autoLaunch = false

[context.deploy-preview]
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "production" }

# ─── Redirects ───────────────────────────────────────────────────

[[redirects]]
  from = "/artigos"
  to = "/artigos.html"
  status = 200

[[redirects]]
  from = "/artigos/:id"
  to = "/artigo.html?id=:id"
  status = 200
  force = true

[[redirects]]
  from = "/artigo"
  to = "/artigo.html"
  status = 200

[[redirects]]
  from = "/eventos"
  to = "/eventos.html"
  status = 200

[[redirects]]
  from = "/eventos/:id"
  to = "/evento.html?id=:id"
  status = 200
  force = true

[[redirects]]
  from = "/evento"
  to = "/evento.html"
  status = 200

[[redirects]]
  from = "/inscricao"
  to = "/inscricao.html"
  status = 200

[[redirects]]
  from = "/sobre"
  to = "/sobre.html"
  status = 200

[[redirects]]
  from = "/lives"
  to = "/lives-list.html"
  status = 200

[[redirects]]
  from = "/lives-list"
  to = "/lives-list.html"
  status = 200

[[redirects]]
  from = "/lives/:id"
  to = "/lives.html?id=:id"
  status = 200
  force = true

# Must be last — catches all unmatched routes
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ─── Headers ─────────────────────────────────────────────────────

# Security headers (all routes)
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Permitted-Cross-Domain-Policies = "none"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    Cache-Control = "public, max-age=3600, s-maxage=3600"
    Netlify-CDN-Cache-Control = "public, s-maxage=3600, stale-while-revalidate=86400"

# HTML pages — stale-while-revalidate for CDN
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "public, s-maxage=3600, stale-while-revalidate=86400"

# Fingerprinted assets — immutable cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Plugins ─────────────────────────────────────────────────────

[[plugins]]
  package = "@netlify/plugin-lighthouse"
  [plugins.inputs]
    audits = ["performance", "accessibility", "seo"]
