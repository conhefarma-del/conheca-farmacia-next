[build]
  command = "npm run build"
  publish = "."

[[redirects]]
  from = "/artigos"
  to = "/artigos.html"
  status = 200

[[redirects]]
  from = "/artigos/:id"
  to = "/artigo.html?id=:id"
  status = 200

[[redirects]]
  from = "/artigo"
  to = "/artigo.html"
  status = 200

[[redirects]]
  from = "/eventos"
  to = "/eventos.html"
  status = 200

[[redirects]]
  from = "/eventos/:id"
  to = "/evento.html?id=:id"
  status = 200

[[redirects]]
  from = "/evento"
  to = "/evento.html"
  status = 200

[[redirects]]
  from = "/inscricao"
  to = "/inscricao.html"
  status = 200

[[redirects]]
  from = "/sobre"
  to = "/sobre.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.supabase.co; connect-src 'self' https://*.supabase.co; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;"

[[headers]]
  for = "/dist/output.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
