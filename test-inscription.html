<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Simples - Inscrição</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; }
        .box { background: #f0f0f0; padding: 20px; border-radius: 8px; margin: 20px 0; }
        button { background: #00493a; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .log { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 4px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .success { background: #d4edda; border-color: #0a844f; color: #0a844f; }
        .error { background: #f8d7da; border-color: #dc2626; color: #dc2626; }
    </style>
</head>
<body>
    <h1>🧪 Teste Simples de Inscrição</h1>

    <div class="box">
        <h3>Status:</h3>
        <div id="status">⏳ Carregando...</div>
    </div>

    <button onclick="testInscrption()">Enviar Inscrição de Teste</button>

    <h3>Log de Execução:</h3>
    <div id="log" class="log">Aguardando teste...</div>

    <script src="config.js" defer></script>
    <script>
        const logDiv = document.getElementById('log');
        const statusDiv = document.getElementById('status');

        // Redirecionar console.log para a página
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog(...args);
            const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
            logDiv.innerHTML += msg + '<br>';
            logDiv.scrollTop = logDiv.scrollHeight;
        };

        console.log('📄 Página carregada');

        window.addEventListener('supabase-ready', () => {
            console.log('✅ Supabase está pronto');
            statusDiv.innerHTML = '✅ Supabase conectado e pronto';
            statusDiv.className = 'success';
        });

        setTimeout(() => {
            if (!window.supabase) {
                console.error('❌ Supabase não foi inicializado');
                statusDiv.innerHTML = '❌ Erro: Supabase não inicializado';
                statusDiv.className = 'error';
            }
        }, 2000);

        async function testInscrption() {
            console.log('\n🧪 Iniciando teste de inscrição...\n');

            if (!window.supabase) {
                console.error('❌ Supabase não está disponível');
                return;
            }

            const testData = {
                nome: 'Teste ' + new Date().getTime(),
                email: 'teste@exemplo.com',
                telefone: '+244 900 000 000',
                profissao: 'farmaceutico',
                origem_evento: 'teste-simples',
                evento_slug: 'teste-simples'
            };

            console.log('📝 Dados a enviar:', testData);

            const { data, error } = await window.supabase
                .from('inscricoes')
                .insert([testData]);

            if (error) {
                console.error('❌ ERRO:', error);
                statusDiv.innerHTML = '❌ Erro: ' + error.message;
                statusDiv.className = 'error';
                return;
            }

            console.log('✅ SUCESSO! Inscrição criada com ID:', data[0]?.id);
            statusDiv.innerHTML = '✅ Inscrição enviada com sucesso! ID: ' + data[0]?.id;
            statusDiv.className = 'success';
        }
    </script>
</body>
</html>
